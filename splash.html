<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Source Code IDE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e10;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#c8ccd4;overflow:hidden}
.wrap{text-align:center}
.logo{font-size:64px;color:#7c6bf6;margin-bottom:24px;animation:pulse 2s ease-in-out infinite}
h1{font-size:22px;font-weight:500;letter-spacing:.4px;margin-bottom:10px}
p{font-size:13px;color:#6c7086;margin-bottom:32px}
.bar{width:200px;height:3px;background:#1e1e24;border-radius:3px;margin:0 auto;overflow:hidden;position:relative}
.bar::after{content:'';position:absolute;left:-40%;top:0;width:40%;height:100%;background:linear-gradient(90deg,transparent,#7c6bf6,transparent);border-radius:3px;animation:slide 1.2s ease-in-out infinite}
@keyframes slide{0%{left:-40%}100%{left:100%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">◆</div>
  <h1>Source Code IDE</h1>
  <p>Loading workspace…</p>
  <div class="bar"></div>
</div>
</body>
</html>
